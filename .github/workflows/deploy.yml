name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dev dependencies
        run: npm install

      - name: Install parser dependencies
        run: npm install
        working-directory: functions/parser

      - name: Install entrypoint dependencies
        run: npm install
        working-directory: functions/entrypoint

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # Public ECR auth endpoint requires us-east-1
          aws-region: us-east-1

      - name: Log in to private ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REPO: 170996870592.dkr.ecr.us-east-1.amazonaws.com/fruitingcrawler59e300c0/parserfunction8bf1608erepo
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REPO:${{ github.sha }} \
            ./functions/parser
          docker push $ECR_REPO:${{ github.sha }}

      - name: Deploy
        env:
          ECR_REPO: 170996870592.dkr.ecr.us-east-1.amazonaws.com/fruitingcrawler59e300c0/parserfunction8bf1608erepo
        run: |
          aws cloudformation package \
            --template-file template.yaml \
            --s3-bucket aws-sam-cli-managed-default-samclisourcebucket-cuujwkgw8mcs \
            --s3-prefix fruiting-crawler \
            --region us-east-1 \
            --output-template-file packaged.yaml

          aws cloudformation deploy \
            --template-file packaged.yaml \
            --stack-name fruiting-crawler \
            --region us-east-1 \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides ImageUri=$ECR_REPO:${{ github.sha }}
